name: phosphotrap
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - streamlit>=1.30
  - pandas>=2.0
  - numpy>=1.24
  - plotly>=5.18
  - python-kaleido  # static SVG / PNG / PDF export for the Figures tab
  - scipy>=1.11
  - pytest>=7  # for `pytest tests/`
  - fastp
  - salmon>=1.10
  - r-base>=4.3
  - r-jsonlite
  - bioconductor-tximport
  - bioconductor-anota2seq>=1.22
  - bioconductor-deseq2
  # apeglm (Zhu 2018) for LFC shrinkage with s-values — required for
  # the DESeq2 small-n recovery mode. Available on all bioconda
  # platforms (linux-64, osx-64, osx-arm64).
  - bioconductor-apeglm
  # IHW (Ignatiadis 2016, Nat Methods) for baseMean-weighted padj is
  # *not* listed here because its dependency ``bioconductor-lpsymphony``
  # has no osx-arm64 build (Apple Silicon). The DESeq2 runner already
  # falls back gracefully when IHW is missing — only the ``padj_ihw``
  # column is dropped from the output. To install IHW manually on
  # platforms where it works (linux-64 / osx-64 with conda, or any
  # platform via BiocManager from R):
  #   conda install -n phosphotrap -c bioconda bioconductor-ihw
  # or, from inside R:
  #   if (!require("BiocManager")) install.packages("BiocManager")
  #   BiocManager::install("IHW")
