name: phosphotrap
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - streamlit>=1.30
  - pandas>=2.0
  - numpy>=1.24
  - plotly>=5.18
  - python-kaleido  # static SVG / PNG / PDF export for the Figures tab
  - scipy>=1.11
  - pytest>=7  # for `pytest tests/`
  - fastp
  - salmon>=1.10
  - r-base>=4.3
  - r-jsonlite
  - bioconductor-tximport
  - bioconductor-anota2seq>=1.22
  - bioconductor-deseq2
  # DESeq2 small-n recovery: IHW (Ignatiadis 2016, Nat Methods) for
  # baseMean-weighted padj, apeglm (Zhu 2018) for LFC shrinkage with
  # s-values. Both are optional — the DESeq2 runner falls back
  # gracefully when either is missing.
  - bioconductor-ihw
  - bioconductor-apeglm
